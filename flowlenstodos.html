<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowLens — Full Build Guide</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #30363d;
    --border-light: #21262d;
    --blue: #3b82f6;
    --blue-dim: #1d3a6e;
    --purple: #a855f7;
    --purple-dim: #3b1f6b;
    --green: #22c55e;
    --green-dim: #14532d;
    --amber: #f59e0b;
    --amber-dim: #451a03;
    --red: #ef4444;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --radius: 8px;
    --mono: 'Geist Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Geist', 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border-light);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }

  .logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text-muted); }

  .progress-bar-wrap {
    background: var(--bg);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-muted);
    margin-top: 5px;
  }

  .phase-nav { padding: 8px 0; flex: 1; }

  .phase-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-muted);
    border-left: 2px solid transparent;
  }

  .phase-nav-item:hover { background: var(--surface2); color: var(--text); }
  .phase-nav-item.active { background: var(--surface2); color: var(--text); border-left-color: var(--blue); }
  .phase-nav-item.done { color: var(--green); }
  .phase-nav-item.done .phase-dot { background: var(--green); }

  .phase-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .phase-nav-item.active .phase-dot { background: var(--blue); }

  .phase-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Main content */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    max-width: 900px;
  }

  .phase-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-light);
  }

  .phase-badge {
    background: var(--blue-dim);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-top: 4px;
  }

  .phase-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .phase-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

  /* Steps */
  .step-group { margin-bottom: 28px; }

  .step-group-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-group-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .step:hover { border-color: var(--border); }
  .step.completed { border-color: var(--green-dim); background: #0d1f14; }
  .step.expanded { border-color: var(--blue-dim); }

  .step-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .step-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .step.completed .step-check {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  .step-check svg { display: none; }
  .step.completed .step-check svg { display: block; }

  .step-info { flex: 1; }

  .step-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .step.completed .step-title { color: var(--text-muted); text-decoration: line-through; }

  .step-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .tag-hard { background: #2d1a1a; color: var(--red); }
  .tag-medium { background: var(--amber-dim); color: var(--amber); }
  .tag-easy { background: var(--green-dim); color: var(--green); }
  .tag-new { background: var(--purple-dim); color: var(--purple); }
  .tag-tool { background: var(--surface2); color: var(--text-muted); }

  .step-expand {
    color: var(--text-dim);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
    transition: color 0.2s;
  }

  .step:hover .step-expand { color: var(--text-muted); }

  .step-body {
    display: none;
    padding: 0 16px 16px 46px;
    border-top: 1px solid var(--border-light);
    padding-top: 14px;
  }

  .step.expanded .step-body { display: block; }

  .step-body p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
    line-height: 1.7;
  }

  .step-body h4 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 14px 0 6px;
  }

  pre, code {
    font-family: var(--mono);
    font-size: 12px;
  }

  pre {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 8px 0;
    line-height: 1.6;
    color: #c9d1d9;
  }

  code {
    background: var(--surface2);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--blue);
    font-size: 12px;
  }

  .warn-box {
    background: #1a1200;
    border: 1px solid #3d2800;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 12px;
    color: var(--amber);
    line-height: 1.6;
  }

  .warn-box::before { content: '⚠ '; }

  .info-box {
    background: #0d1f3c;
    border: 1px solid var(--blue-dim);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 12px;
    color: #7eb3f5;
    line-height: 1.6;
  }

  .info-box::before { content: '→ '; }

  .success-box {
    background: var(--green-dim);
    border: 1px solid #166534;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 12px;
    color: #4ade80;
    line-height: 1.6;
  }

  .success-box::before { content: '✓ '; }

  ul.checklist { list-style: none; padding: 0; }
  ul.checklist li {
    font-size: 12px;
    color: var(--text-muted);
    padding: 3px 0 3px 16px;
    position: relative;
  }
  ul.checklist li::before {
    content: '·';
    position: absolute; left: 4px;
    color: var(--text-dim);
  }

  .nav-btns {
    display: flex;
    gap: 8px;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border-light);
  }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .phase-content { display: none; }
  .phase-content.active { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">FL</div>
        <div>
          <div class="logo-text">FlowLens</div>
          <div class="logo-sub">Build Guide</div>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressText">0 of 0 done</span>
        <span id="progressPct">0%</span>
      </div>
    </div>
    <div class="phase-nav" id="phaseNav"></div>
  </nav>

  <!-- Main -->
  <main class="main" id="mainContent"></main>
</div>

<script>
const phases = [
  {
    id: 'p0',
    label: 'Project Setup',
    badge: 'PHASE 0',
    title: 'Project Setup & Tooling',
    desc: 'Initialize repositories, configure tools, and set up your development environment before writing a single line of product code.',
    groups: [
      {
        title: 'Repository & tooling',
        steps: [
          {
            title: 'Create monorepo with two workspaces',
            difficulty: 'easy',
            tags: ['Git'],
            detail: `<p>FlowLens has a Next.js frontend and an Express backend. Keep them in one repo for simpler cross-referencing during solo development.</p>
<h4>Commands</h4>
<pre>mkdir flowlens && cd flowlens
git init
mkdir apps && mkdir apps/web apps/api
echo "node_modules" >> .gitignore
echo ".env*" >> .gitignore</pre>
<h4>Root package.json</h4>
<pre>{
  "name": "flowlens",
  "private": true,
  "workspaces": ["apps/*"],
  "scripts": {
    "dev:web": "npm run dev --workspace=apps/web",
    "dev:api": "npm run dev --workspace=apps/api"
  }
}</pre>
<div class="info-box">Run both dev servers simultaneously with two terminals — one for web, one for api.</div>`
          },
          {
            title: 'Set up ESLint + Prettier across both apps',
            difficulty: 'easy',
            tags: ['Tooling'],
            detail: `<p>Consistent formatting prevents trivial git diffs and keeps the codebase readable.</p>
<pre>npm install -D eslint prettier eslint-config-prettier --save-exact
npx eslint --init</pre>
<h4>Root .prettierrc</h4>
<pre>{
  "semi": true,
  "singleQuote": true,
  "tabWidth": 2,
  "trailingComma": "all",
  "printWidth": 100
}</pre>`
          },
          {
            title: 'Configure TypeScript in both apps',
            difficulty: 'easy',
            tags: ['TypeScript'],
            detail: `<h4>apps/api/tsconfig.json</h4>
<pre>{
  "compilerOptions": {
    "target": "ES2022",
    "module": "commonjs",
    "outDir": "dist",
    "rootDir": "src",
    "strict": true,
    "esModuleInterop": true,
    "resolveJsonModule": true,
    "skipLibCheck": true
  },
  "include": ["src/**/*"]
}</pre>
<div class="info-box">Next.js ships its own tsconfig — don't duplicate settings. Just extend the default Next.js one.</div>`
          }
        ]
      },
      {
        title: 'Accounts to create',
        steps: [
          {
            title: 'Create Supabase project',
            difficulty: 'easy',
            tags: ['Supabase'],
            detail: `<p>Go to supabase.com → New Project. Choose a region close to your users. Note down:</p>
<ul class="checklist">
  <li>Project URL (NEXT_PUBLIC_SUPABASE_URL)</li>
  <li>Anon key (NEXT_PUBLIC_SUPABASE_ANON_KEY)</li>
  <li>Service role key (SUPABASE_SERVICE_ROLE_KEY) — backend only, never expose to frontend</li>
  <li>Database connection string (DATABASE_URL)</li>
</ul>
<div class="warn-box">Service role key bypasses Row Level Security. Only use it in your Express backend, never in the browser.</div>`
          },
          {
            title: 'Create Vercel project and link repo',
            difficulty: 'easy',
            tags: ['Vercel'],
            detail: `<p>Go to vercel.com → Import Git Repository → select flowlens. Set root directory to <code>apps/web</code>.</p>
<h4>Environment variables to add in Vercel dashboard</h4>
<pre>NEXT_PUBLIC_SUPABASE_URL=
NEXT_PUBLIC_SUPABASE_ANON_KEY=
NEXT_PUBLIC_API_URL=https://your-api.railway.app</pre>
<div class="info-box">Deploy the API separately on Railway. Vercel is for the Next.js frontend only.</div>`
          },
          {
            title: 'Get Anthropic API key',
            difficulty: 'easy',
            tags: ['Anthropic'],
            detail: `<p>Go to console.anthropic.com → API Keys → Create Key. Store it as <code>ANTHROPIC_API_KEY</code> in your API's environment. Never put this in the frontend.</p>`
          }
        ]
      }
    ]
  },
  {
    id: 'p1',
    label: 'Database Schema',
    badge: 'PHASE 1',
    title: 'Database Schema (Supabase)',
    desc: 'Design and create the Postgres schema. This is the most important phase — get it right before writing any application code.',
    groups: [
      {
        title: 'Core tables',
        steps: [
          {
            title: 'Create teams and users tables',
            difficulty: 'easy',
            tags: ['SQL', 'Supabase'],
            detail: `<p>Run this in Supabase SQL Editor. FlowLens is team-scoped — every resource belongs to a team.</p>
<pre>-- Teams
create table teams (
  id uuid primary key default gen_random_uuid(),
  name text not null,
  created_at timestamptz default now()
);

-- Profiles (extends Supabase auth.users)
create table profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  team_id uuid references teams(id),
  display_name text,
  role text default 'member' check (role in ('owner','admin','member')),
  created_at timestamptz default now()
);</pre>
<div class="info-box">Supabase handles auth.users automatically. profiles extends it with your app-specific fields.</div>`
          },
          {
            title: 'Create workflows table',
            difficulty: 'easy',
            tags: ['SQL'],
            detail: `<pre>create table workflows (
  id uuid primary key default gen_random_uuid(),
  team_id uuid not null references teams(id) on delete cascade,
  name text not null,
  platform text not null check (platform in ('n8n','zapier','make','manual')),
  external_id text,  -- ID from the source platform
  status text default 'healthy' check (status in ('healthy','degraded','failing','unknown')),
  last_snapshot_at timestamptz,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

create index idx_workflows_team on workflows(team_id);
create index idx_workflows_status on workflows(team_id, status);</pre>`
          },
          {
            title: 'Create snapshots table (the most important table)',
            difficulty: 'medium',
            tags: ['SQL', 'JSONB'],
            detail: `<p>Every version of a workflow is stored as an immutable snapshot. Never update a snapshot — only create new ones. This is the foundation of the diff engine.</p>
<pre>create table snapshots (
  id uuid primary key default gen_random_uuid(),
  workflow_id uuid not null references workflows(id) on delete cascade,
  team_id uuid not null references teams(id),

  -- The normalised workflow structure (your platform-agnostic format)
  normalised jsonb not null,

  -- The raw original JSON from n8n/Zapier/Make (for reference)
  raw jsonb,

  -- Metadata
  source text not null check (source in ('webhook','manual','import','api')),
  label text,  -- e.g. "Last known working"
  created_by uuid references profiles(id),
  created_at timestamptz default now(),

  -- Execution outcome that triggered this snapshot (if from webhook)
  execution_status text check (execution_status in ('success','failure','unknown')),
  error_message text
);

create index idx_snapshots_workflow on snapshots(workflow_id, created_at desc);
create index idx_snapshots_team on snapshots(team_id);
-- GIN index for querying inside JSONB
create index idx_snapshots_normalised on snapshots using gin(normalised);</pre>
<div class="warn-box">Never store raw credential values in snapshots. Strip them during the import/normalise step and replace with a placeholder like "credential_ref:shopify_oauth".</div>`
          },
          {
            title: 'Create incidents and AI analyses tables',
            difficulty: 'medium',
            tags: ['SQL'],
            detail: `<pre>-- Incidents: a detected failure event
create table incidents (
  id uuid primary key default gen_random_uuid(),
  workflow_id uuid not null references workflows(id) on delete cascade,
  team_id uuid not null references teams(id),
  status text default 'open' check (status in ('open','resolved','dismissed')),
  detected_at timestamptz default now(),
  resolved_at timestamptz,

  -- The two snapshots being compared
  snapshot_before uuid references snapshots(id),
  snapshot_after uuid references snapshots(id),

  -- AI-generated analysis (stored here after generation)
  root_cause text,
  confidence numeric(3,2),
  impact_summary text,
  suggested_fix jsonb
);

create index idx_incidents_workflow on incidents(workflow_id, detected_at desc);
create index idx_incidents_team_open on incidents(team_id) where status = 'open';</pre>`
          },
          {
            title: 'Create change_log table',
            difficulty: 'easy',
            tags: ['SQL'],
            detail: `<pre>-- Every meaningful change event attributed to a user or system
create table change_log (
  id uuid primary key default gen_random_uuid(),
  workflow_id uuid not null references workflows(id) on delete cascade,
  team_id uuid not null references teams(id),
  snapshot_id uuid references snapshots(id),
  actor_id uuid references profiles(id),
  actor_type text default 'user' check (actor_type in ('user','system','ai')),
  action text not null,  -- e.g. "snapshot_created", "restored", "ai_fix_applied"
  diff_summary jsonb,    -- lightweight summary of what changed
  created_at timestamptz default now()
);

create index idx_changelog_workflow on change_log(workflow_id, created_at desc);</pre>`
          }
        ]
      },
      {
        title: 'Row Level Security',
        steps: [
          {
            title: 'Enable RLS on all tables',
            difficulty: 'medium',
            tags: ['Security', 'Supabase'],
            detail: `<p>RLS ensures users can only see data belonging to their team, enforced at the database level.</p>
<pre>-- Enable RLS
alter table teams enable row level security;
alter table profiles enable row level security;
alter table workflows enable row level security;
alter table snapshots enable row level security;
alter table incidents enable row level security;
alter table change_log enable row level security;

-- Helper function: get current user's team_id
create or replace function get_my_team_id()
returns uuid language sql security definer as $$
  select team_id from profiles where id = auth.uid()
$$;

-- Policies: users see only their team's data
create policy "team_workflows" on workflows
  for all using (team_id = get_my_team_id());

create policy "team_snapshots" on snapshots
  for all using (team_id = get_my_team_id());

create policy "team_incidents" on incidents
  for all using (team_id = get_my_team_id());

create policy "team_changelog" on change_log
  for all using (team_id = get_my_team_id());</pre>
<div class="info-box">Your Express backend uses the service role key which bypasses RLS — RLS only protects the frontend Supabase client calls.</div>`
          }
        ]
      }
    ]
  },
  {
    id: 'p2',
    label: 'Express API',
    badge: 'PHASE 2',
    title: 'Express API (MVC)',
    desc: 'Build the Node.js/Express backend with a clean MVC structure. This is your data engine — frontend talks to this, this talks to Supabase.',
    groups: [
      {
        title: 'Project scaffold',
        steps: [
          {
            title: 'Initialize Express app with MVC folder structure',
            difficulty: 'easy',
            tags: ['Express', 'TypeScript'],
            detail: `<pre>cd apps/api
npm init -y
npm install express cors helmet morgan dotenv
npm install @supabase/supabase-js @anthropic-ai/sdk
npm install -D typescript ts-node-dev @types/express @types/node @types/cors</pre>
<h4>Folder structure</h4>
<pre>apps/api/src/
├── controllers/
│   ├── workflow.controller.ts
│   ├── snapshot.controller.ts
│   ├── incident.controller.ts
│   ├── diff.controller.ts
│   └── ai.controller.ts
├── models/
│   ├── workflow.model.ts
│   ├── snapshot.model.ts
│   └── incident.model.ts
├── services/
│   ├── normaliser.service.ts   ← converts platform JSON to FlowLens format
│   ├── diff.service.ts         ← core diff algorithm
│   ├── ai.service.ts           ← Anthropic SDK calls
│   └── supabase.service.ts     ← DB client
├── routes/
│   ├── index.ts
│   ├── workflow.routes.ts
│   ├── snapshot.routes.ts
│   ├── incident.routes.ts
│   └── ai.routes.ts
├── middleware/
│   ├── auth.middleware.ts
│   ├── validate.middleware.ts
│   └── error.middleware.ts
├── types/
│   └── flowlens.types.ts
└── app.ts</pre>`
          },
          {
            title: 'Set up app.ts entry point',
            difficulty: 'easy',

            detail: `<h4>src/app.ts</h4>

            detail: `<p>This is the most important service. It converts n8n/Zapier/Make JSON into your platform-agnostic FlowLens format. Start with n8n only.</p>
<h4>src/services/normaliser.service.ts</h4>
<pre>import { NormalisedWorkflow, FlowNode, FlowEdge } from '../types/flowlens.types';

// Strip credentials from config before storage
function stripCredentials(config: Record<string, unknown>): Record<string, unknown> {
  const safe = { ...config };
  const credentialKeys = ['apiKey', 'token', 'password', 'secret', 'credentials'];
  credentialKeys.forEach(k => { if (k in safe) safe[k] = '[REDACTED]'; });
  return safe;
}

export function normaliseN8n(raw: Record<string, unknown>): NormalisedWorkflow {
  const nodes = ((raw.nodes as any[]) || []).map((n): FlowNode => ({
    id: n.id,
    type: n.type,
    label: n.name || n.type,
    config: stripCredentials(n.parameters || {}),
    credential_ref: n.credentials
      ? Object.keys(n.credentials)[0]
      : undefined,
    position: n.position ? { x: n.position[0], y: n.position[1] } : undefined,
  }));

  const edges = ((raw.connections as any) || {});
  const flowEdges: FlowEdge[] = [];
  Object.entries(edges).forEach(([sourceLabel, targets]: [string, any]) => {
    const sourceNode = nodes.find(n => n.label === sourceLabel);
    if (!sourceNode) return;
    (targets.main || []).forEach((outputs: any[]) => {
      outputs.forEach((conn: any) => {
        const targetNode = nodes.find(n => n.label === conn.node);
        if (targetNode) flowEdges.push({
          id: \`\${sourceNode.id}->\${targetNode.id}\`,
          source: sourceNode.id,
          target: targetNode.id,
        });
      });
    });
  });

  return {
    nodes,
    edges: flowEdges,
    meta: { platform: 'n8n', name: (raw.name as string) || 'Unnamed', version: raw.versionId as string },
  };
}

export function normalise(platform: string, raw: Record<string, unknown>): NormalisedWorkflow {
  switch (platform) {
    case 'n8n': return normaliseN8n(raw);
    // TODO: case 'zapier': return normaliseZapier(raw);
    // TODO: case 'make': return normaliseMake(raw);
    default: throw new Error(\`Unsupported platform: \${platform}\`);
  }
}</pre>
<div class="warn-box">Build normaliseZapier and normaliseMake only after n8n is fully working. Platform-specific edge cases will consume days if done in parallel.</div>`

            detail: `<p>Compares two NormalisedWorkflow objects and returns a structured diff. This powers the Visual Compare screen.</p>
<h4>src/services/diff.service.ts</h4>
<pre>import { NormalisedWorkflow, WorkflowDiff, NodeDiff, FlowNode } from '../types/flowlens.types';

function diffNodeConfig(before: Record<string, unknown>, after: Record<string, unknown>) {
  const changed: Array<{ field: string; before: unknown; after: unknown }> = [];
  const allKeys = new Set([...Object.keys(before), ...Object.keys(after)]);
  allKeys.forEach(key => {
    const bVal = JSON.stringify(before[key]);
    const aVal = JSON.stringify(after[key]);
    if (bVal !== aVal) changed.push({ field: key, before: before[key], after: after[key] });
  });
  return changed;
}

export function diffWorkflows(before: NormalisedWorkflow, after: NormalisedWorkflow): WorkflowDiff {
  const beforeMap = new Map(before.nodes.map(n => [n.id, n]));
  const afterMap = new Map(after.nodes.map(n => [n.id, n]));

  const nodeDiffs: NodeDiff[] = [];

  // Nodes in before
  beforeMap.forEach((bNode, id) => {
    const aNode = afterMap.get(id);
    if (!aNode) {
      nodeDiffs.push({ nodeId: id, nodeLabel: bNode.label, status: 'removed' });
    } else {
      const changedFields = diffNodeConfig(
        bNode.config as Record<string, unknown>,
        aNode.config as Record<string, unknown>
      );
      nodeDiffs.push({
        nodeId: id,
        nodeLabel: bNode.label,
        status: changedFields.length > 0 ? 'modified' : 'unchanged',
        changedFields: changedFields.length > 0 ? changedFields : undefined,
      });
    }
  });

  // Nodes added in after
  afterMap.forEach((aNode, id) => {
    if (!beforeMap.has(id)) {
      nodeDiffs.push({ nodeId: id, nodeLabel: aNode.label, status: 'added' });
    }
  });

  // Edge diff (simple: did the set of edges change?)
  const beforeEdgeSet = new Set(before.edges.map(e => \`\${e.source}->\${e.target}\`));
  const afterEdgeSet = new Set(after.edges.map(e => \`\${e.source}->\${e.target}\`));
  const edgesChanged = [...beforeEdgeSet].some(e => !afterEdgeSet.has(e))
    || [...afterEdgeSet].some(e => !beforeEdgeSet.has(e));

  const summary = {
    added: nodeDiffs.filter(n => n.status === 'added').length,
    removed: nodeDiffs.filter(n => n.status === 'removed').length,
    modified: nodeDiffs.filter(n => n.status === 'modified').length,
  };

  return { nodes: nodeDiffs, edgesChanged, summary };
}</pre>`

<h4>src/middleware/auth.middleware.ts</h4>
<pre>import { Request, Response, NextFunction } from 'express';
import { createClient } from '@supabase/supabase-js';

const supabase = createClient(
  process.env.SUPABASE_URL!,
  process.env.SUPABASE_ANON_KEY!
);

declare global {
  namespace Express {
    interface Request {
      user: { id: string; team_id: string; role: string };
    }
  }
}

export const authMiddleware = async (req: Request, res: Response, next: NextFunction) => {
  const token = req.headers.authorization?.replace('Bearer ', '');
  if (!token) return res.status(401).json({ error: 'Missing token' });

  const { data: { user }, error } = await supabase.auth.getUser(token);
  if (error || !user) return res.status(401).json({ error: 'Invalid token' });

  const { data: profile } = await supabase
    .from('profiles')
    .select('team_id, role')
    .eq('id', user.id)
    .single();

  if (!profile?.team_id) return res.status(403).json({ error: 'No team assigned' });

  req.user = { id: user.id, team_id: profile.team_id, role: profile.role };
  next();
};</pre>`

export default function AIAssistant({ workflowId }: { workflowId: string }) {
  const [messages, setMessages] = useState&lt;{role:string; content:string}[]&gt;([]);
  const [input, setInput] = useState('');
  const [streaming, setStreaming] = useState(false);

  const sendMessage = async () => {
    if (!input.trim() || streaming) return;
    const userMsg = { role: 'user', content: input };
    const updated = [...messages, userMsg];
    setMessages([...updated, { role: 'assistant', content: '' }]);
    setInput('');
    setStreaming(true);

    const res = await fetch(\`\${process.env.NEXT_PUBLIC_API_URL}/api/v1/ai/chat\`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',
        Authorization: \`Bearer \${await getToken()}\` },
      body: JSON.stringify({ messages: updated, workflow_id: workflowId }),
    });

    const reader = res.body!.getReader();
    const decoder = new TextDecoder();
    let aiText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\\n');
      lines.forEach(line => {
        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
          try {
            const { text } = JSON.parse(line.slice(6));
            aiText += text;
            setMessages(prev => [
              ...prev.slice(0, -1),
              { role: 'assistant', content: aiText }
            ]);
          } catch {}
        }
      });
    }
    setStreaming(false);

<pre>// Validate webhook signature to prevent spoofing
function validateN8nSignature(payload: string, signature: string, secret: string): boolean {
  const crypto = require('crypto');
  const expected = crypto.createHmac('sha256', secret).update(payload).digest('hex');
  return crypto.timingSafeEqual(Buffer.from(signature), Buffer.from(expected));
}

export const receiveN8nWebhook = async (req: Request, res: Response, next: NextFunction) => {
  try {
    const signature = req.headers['x-n8n-signature'] as string;
    const rawBody = JSON.stringify(req.body);

    // Find workflow by external_id
    const { data: workflow } = await supabase
      .from('workflows')
      .select('id, team_id')
      .eq('external_id', req.body.workflowId)
      .single();

    if (!workflow) return res.status(404).json({ error: 'Unknown workflow' });

    // Store snapshot + update workflow status
    const executionStatus = req.body.status === 'error' ? 'failure' : 'success';
    const { data: snapshot } = await supabase.from('snapshots').insert({
      workflow_id: workflow.id,
      team_id: workflow.team_id,
      normalised: normalise('n8n', req.body.workflow),
      raw: req.body,
      source: 'webhook',
      execution_status: executionStatus,
      error_message: req.body.error?.message,
    }).select().single();

    // If failure, create an incident
    if (executionStatus === 'failure') {
      const { data: prevSnapshot } = await supabase
        .from('snapshots')
        .select('id')
        .eq('workflow_id', workflow.id)
        .eq('execution_status', 'success')
        .order('created_at', { ascending: false })
        .limit(1).single();

      await supabase.from('incidents').insert({
        workflow_id: workflow.id,
        team_id: workflow.team_id,
        snapshot_before: prevSnapshot?.id,
        snapshot_after: snapshot.id,
        error_message: req.body.error?.message,
      });

      // Update workflow status
      await supabase.from('workflows').update({ status: 'failing' }).eq('id', workflow.id);
    }

    res.json({ ok: true });
  } catch (err) { next(err); }
};</pre>

// ─── State ───────────────────────────────────────────────────────────────────
const STATE_KEY = 'flowlens_guide_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// ─── Render ───────────────────────────────────────────────────────────────────
let currentPhase = 0;
let checked = loadState();

function allStepIds() {
  return phases.flatMap(p => p.groups.flatMap(g => g.steps.map((s, si) => p.id + '-' + g.title + '-' + si)));
}

function phaseStepIds(phase) {
  return phase.groups.flatMap(g => g.steps.map((_, si) => phase.id + '-' + g.title + '-' + si));
}

function updateProgress() {
  const all = allStepIds();
  const done = all.filter(id => checked[id]).length;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' of ' + all.length + ' done';
  document.getElementById('progressPct').textContent = pct + '%';

  phases.forEach((p, pi) => {
    const ids = phaseStepIds(p);
    const pDone = ids.filter(id => checked[id]).length;
    const navItem = document.querySelector('[data-phase="' + pi + '"]');
    if (!navItem) return;
    const dot = navItem.querySelector('.phase-dot');
    const count = navItem.querySelector('.phase-count');
    if (count) count.textContent = pDone + '/' + ids.length;
    if (pDone === ids.length && ids.length > 0) {
      navItem.classList.add('done');
      if (dot) dot.style.background = 'var(--green)';
    } else {
      navItem.classList.remove('done');
      if (dot) dot.style.background = '';
    }
  });
}

function renderNav() {
  const nav = document.getElementById('phaseNav');
  nav.innerHTML = phases.map((p, pi) => {
    const ids = phaseStepIds(p);
    const done = ids.filter(id => checked[id]).length;
    return '<div class="phase-nav-item ' + (pi === currentPhase ? 'active' : '') + '" data-phase="' + pi + '" onclick="goPhase(' + pi + ')">'
      + '<span class="phase-dot"></span>'
      + '<span>' + p.label + '</span>'
      + '<span class="phase-count">' + done + '/' + ids.length + '</span>'
      + '</div>';
  }).join('');
  updateProgress();
}

function tagClass(t) {
  if (t === 'hard') return 'tag-hard';
  if (t === 'medium') return 'tag-medium';
  if (t === 'easy') return 'tag-easy';
  if (t === 'New' || t === 'Core Logic' || t === 'Core Feature') return 'tag-new';
  return 'tag-tool';
}

function renderPhase() {
  const p = phases[currentPhase];
  const main = document.getElementById('mainContent');

  const stepsHtml = p.groups.map(function(g) {
    const stepCards = g.steps.map(function(s, si) {
      const stepId = p.id + '-' + g.title + '-' + si;
      const isDone = !!checked[stepId];
      const tags = [s.difficulty].concat(s.tags || []).map(function(t) {
        return '<span class="tag ' + tagClass(t) + '">' + t + '</span>';
      }).join('');
      return '<div class="step ' + (isDone ? 'completed' : '') + '" id="step-' + stepId + '">'
        + '<div class="step-header" onclick="toggleStep(\'' + stepId + '\')">'
        + '<div class="step-check" onclick="toggleCheck(event,\'' + stepId + '\')">'
        + '<svg width="10" height="8" viewBox="0 0 10 8" fill="none">'
        + '<path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
        + '</svg></div>'
        + '<div class="step-info">'
        + '<div class="step-title">' + s.title + '</div>'
        + '<div class="step-meta">' + tags + '</div>'
        + '</div>'
        + '<div class="step-expand">▾ details</div>'
        + '</div>'
        + (s.detail ? '<div class="step-body">' + s.detail + '</div>' : '')
        + '</div>';
    }).join('');

    return '<div class="step-group">'
      + '<div class="step-group-title">' + g.title + '</div>'
      + stepCards
      + '</div>';
  }).join('');

  const isFirst = currentPhase === 0;
  const isLast = currentPhase === phases.length - 1;

  main.innerHTML = '<div class="phase-header">'
    + '<div><div class="phase-badge">' + p.badge + '</div></div>'
    + '<div><div class="phase-title">' + p.title + '</div>'
    + '<div class="phase-desc">' + p.desc + '</div></div>'
    + '</div>'
    + stepsHtml
    + '<div class="nav-btns">'
    + '<button class="btn btn-secondary" onclick="goPhase(' + (currentPhase - 1) + ')" ' + (isFirst ? 'disabled' : '') + '>← Previous</button>'
    + '<button class="btn btn-primary" onclick="goPhase(' + (currentPhase + 1) + ')" ' + (isLast ? 'disabled' : '') + '>Next phase →</button>'
    + '</div>';
}

function goPhase(index) {
  if (index < 0 || index >= phases.length) return;
  currentPhase = index;
  renderNav();
  renderPhase();
  document.getElementById('mainContent').scrollTop = 0;
}

function toggleCheck(e, stepId) {
  e.stopPropagation();
  checked[stepId] = !checked[stepId];
  saveState(checked);
  const el = document.getElementById('step-' + stepId);
  if (el) el.classList.toggle('completed', checked[stepId]);
  updateProgress();
  renderNav();
}

function toggleStep(stepId) {
  const el = document.getElementById('step-' + stepId);
  if (el) el.classList.toggle('expanded');
}

window.goPhase = goPhase;
window.toggleCheck = toggleCheck;
window.toggleStep = toggleStep;

renderNav();
renderPhase();
</script>
</body>
</html>
